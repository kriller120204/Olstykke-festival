<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ØBM Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; }
    img { display: block; max-width: 100%; }

    /* Layout */
    .a-app { min-height: 100vh; display: flex; flex-direction: column; }
    .a-header { background: #111; color: #fff; position: sticky; top: 0; z-index: 10; }
    .a-header-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .a-brand { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; }
    .a-logo { background: #e63946; color: #fff; font-weight: 900; font-size: 22px; width: 40px; height: 40px; display: grid; place-items: center; }
    .a-logo-sm { background: #e63946; color: #fff; font-weight: 900; font-size: 15px; padding: 4px 8px; }

    /* Tabs */
    .a-tabs { background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; padding: 0 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .a-tab { padding: 16px 20px; font-size: 14px; font-weight: 500; color: #666; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
    .a-tab.active { color: #e63946; border-bottom-color: #e63946; }
    .a-tab:hover:not(.active) { color: #111; }

    /* Content area */
    .a-content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; width: 100%; flex: 1; }

    /* Section head */
    .a-section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .a-section-head h2 { margin: 0; font-size: 22px; }

    /* Day tabs */
    .a-day-tabs { display: flex; gap: 6px; }
    .a-day-tab { padding: 8px 16px; font-size: 13px; font-weight: 500; background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
    .a-day-tab.active { background: #e63946; color: #fff; border-color: #e63946; }

    /* Table */
    .a-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e5e5; font-size: 14px; }
    .a-table th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #888; background: #fafafa; border-bottom: 1px solid #e5e5e5; }
    .a-table td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .a-table tr:last-child td { border-bottom: none; }
    .a-table tr:hover td { background: #fafafa; }
    .a-mono { font-family: monospace; font-size: 13px; color: #d4a942; font-weight: 600; white-space: nowrap; }
    .a-muted { color: #888; font-size: 13px; }
    .a-tag { display: inline-block; padding: 2px 8px; background: #f0f0f0; border-radius: 3px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

    /* Actions */
    .a-actions { display: flex; gap: 8px; white-space: nowrap; }
    .a-actions button { padding: 5px 12px; font-size: 12px; font-weight: 500; border: 1px solid #ddd; border-radius: 3px; background: #fff; }
    .a-actions button:hover { background: #f5f5f5; }
    .a-del { color: #e63946 !important; border-color: #e63946 !important; }
    .a-del:hover { background: #fff5f5 !important; }
    .a-btn-add { margin-top: 12px; padding: 10px 18px; font-size: 13px; font-weight: 600; border: 1px dashed #ccc; background: #fff; border-radius: 4px; color: #555; }
    .a-btn-add:hover { border-color: #e63946; color: #e63946; background: #fff5f5; }

    /* Buttons */
    .a-btn-primary { padding: 10px 20px; background: #e63946; color: #fff; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; }
    .a-btn-primary:hover { background: #c0303b; }
    .a-btn-ghost { padding: 10px 20px; background: #fff; color: #333; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; font-weight: 500; }
    .a-btn-ghost:hover { background: #f5f5f5; }

    /* Fields */
    .a-field { margin-bottom: 16px; }
    .a-field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .a-field input, .a-field textarea, .a-field select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; background: #fff; outline: none; }
    .a-field input:focus, .a-field textarea:focus { border-color: #e63946; }
    .a-field textarea { resize: vertical; }

    /* Modal */
    .a-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .a-modal { background: #fff; border-radius: 6px; padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .a-modal-wide { max-width: 700px; }
    .a-modal h3 { margin: 0 0 20px; font-size: 18px; }
    .a-modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid #e5e5e5; }
    .a-modal-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 4px; }

    /* Card grid (lineup) */
    .a-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .a-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
    .a-card-img { width: 100%; aspect-ratio: 16/11; object-fit: cover; }
    .a-card-img-ph { width: 100%; aspect-ratio: 16/11; background: #f0f0f0; display: grid; place-items: center; font-size: 28px; font-weight: 900; color: #ccc; }
    .a-card-body { padding: 14px 14px 8px; flex: 1; }
    .a-card-tag { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #e63946; margin-bottom: 4px; letter-spacing: 0.06em; }
    .a-card-name { font-size: 15px; font-weight: 700; }
    .a-card-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .a-card-actions { padding: 10px 14px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; }
    .a-card-actions button { flex: 1; padding: 7px; font-size: 12px; font-weight: 500; border: 1px solid #ddd; border-radius: 3px; background: #fff; }
    .a-card-actions button:first-child:hover { background: #f5f5f5; }

    /* Image upload */
    .a-img-upload { width: 100%; aspect-ratio: 4/3; border: 2px dashed #ddd; border-radius: 4px; display: grid; place-items: center; cursor: pointer; overflow: hidden; background: #fafafa; font-size: 13px; color: #999; }
    .a-img-upload:hover { border-color: #e63946; color: #e63946; }
    .a-img-upload-lg { width: 260px; height: 160px; border: 2px dashed #ddd; border-radius: 4px; display: grid; place-items: center; cursor: pointer; overflow: hidden; background: #fafafa; font-size: 13px; color: #999; flex-shrink: 0; }
    .a-img-upload-lg:hover { border-color: #e63946; }
    .a-image-row { display: flex; align-items: flex-start; gap: 24px; padding: 20px; background: #fff; border: 1px solid #e5e5e5; border-radius: 6px; margin-bottom: 16px; }
    .a-image-info { flex: 1; }
    .a-image-info strong { font-size: 15px; }
    .a-image-info p { margin: 6px 0 0; font-size: 13px; color: #888; }

    /* Login */
    .a-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .a-login-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 40px 36px; width: 100%; max-width: 380px; }
    .a-login-box .a-logo { width: 48px; height: 48px; font-size: 22px; margin: 0 auto 20px; }
    .a-login-box h1 { font-size: 24px; margin: 0 0 24px; text-align: center; }
    .a-err { background: #fff5f5; border: 1px solid #e63946; color: #c0303b; padding: 10px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; }
    .a-login-box .a-btn-primary { width: 100%; padding: 12px; font-size: 14px; }

    /* Loading */
    .a-loading { padding: 40px; text-align: center; color: #888; font-size: 14px; }

    @media (max-width: 600px) {
      .a-modal-cols { grid-template-columns: 1fr; }
      .a-image-row { flex-direction: column; }
      .a-img-upload-lg { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="admin-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script type="text/babel" src="admin.jsx"></script>
</body>
</html>
